name: Deploy To Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
      HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
      HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
      HOSTINGER_REMOTE_PATH: ${{ secrets.HOSTINGER_REMOTE_PATH }}
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Prepare deployment bundle
        run: |
          rm -rf release
          mkdir -p release
          cp .htaccess release/.htaccess
          cp index.php release/index.php
          cp -R app release/app
          cp -R config release/config
          cp -R database release/database
          cp -R dist release/dist
          cp -R public release/public
          tar -czf release.tar.gz -C release .

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${HOSTINGER_PORT:-65002}" "$HOSTINGER_HOST" >> ~/.ssh/known_hosts

      - name: Upload deployment bundle
        run: |
          REMOTE_TAR="~/vmrs-release.tar.gz"
          scp -P "${HOSTINGER_PORT:-65002}" release.tar.gz "${HOSTINGER_USERNAME}@${HOSTINGER_HOST}:${REMOTE_TAR}"

      - name: Deploy on Hostinger
        run: |
          ssh -p "${HOSTINGER_PORT:-65002}" "${HOSTINGER_USERNAME}@${HOSTINGER_HOST}" <<EOF
          set -eu
          REMOTE_PATH="${HOSTINGER_REMOTE_PATH}"
          REMOTE_TAR="\$HOME/vmrs-release.tar.gz"
          mkdir -p "\${REMOTE_PATH}"
          rm -rf \
            "\${REMOTE_PATH}/app" \
            "\${REMOTE_PATH}/config" \
            "\${REMOTE_PATH}/database" \
            "\${REMOTE_PATH}/dist" \
            "\${REMOTE_PATH}/public" \
            "\${REMOTE_PATH}/assets" \
            "\${REMOTE_PATH}/.builds" \
            "\${REMOTE_PATH}/index.html" \
            "\${REMOTE_PATH}/apple-touch-icon.png" \
            "\${REMOTE_PATH}/favicon.png" \
            "\${REMOTE_PATH}/vite.svg" \
            "\${REMOTE_PATH}/logo.png" \
            "\${REMOTE_PATH}/.htaccess" \
            "\${REMOTE_PATH}/index.php"
          tar -xzf "\${REMOTE_TAR}" -C "\${REMOTE_PATH}"
          rm -f "\${REMOTE_TAR}"
          EOF
